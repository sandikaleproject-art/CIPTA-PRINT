<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>CIPTA PRINT POS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>CIPTA PRINT</h2>
    <ul>
      <li onclick="showMenu('dashboard')" class="active">Dashboard</li>
<li onclick="showMenu('produk')">Produk</li>
        <li>Customer</li>
        <li>Kasir</li>
        <li>Laporan</li>
        <li>Pengaturan</li>
    </ul>
</div>

<!-- MAIN -->
<div class="main">
<!-- DASHBOARD -->
<div id="dashboardPage">
    <!-- (dashboard lama tetap di sini) -->
</div>

<!-- PRODUK -->
<div id="produkPage" style="display:none;">

    <h2>Manajemen Produk</h2>

    <div class="form-produk">
     <input type="text" id="namaProduk" placeholder="Nama Produk">

<select id="tipeProduk">
    <option value="satuan">Produk Biasa</option>
    <option value="meter">Per Meter (Banner)</option>
</select>

<input type="number" id="hargaProduk" placeholder="Harga / Meter">

<button onclick="tambahProduk()">Tambah</button>
    </div>

    <table>
        <thead>
            <tr>
              <th>Nama</th>
<th>Tipe</th>
<th>Harga</th>
                <th>Aksi</th>
            </tr>
        </thead>
        <tbody id="listProduk"></tbody>
    </table>

</div>
    <!-- HEADER -->
    <div class="header">
        <h1>Dashboard</h1>
    </div>

    <!-- CARD -->
    <div class="cards">

        <div class="card">
            <h3>Produk</h3>
            <p id="totalProduk">0</p>
        </div>

        <div class="card">
            <h3>Customer</h3>
            <p id="totalCustomer">0</p>
        </div>

        <div class="card">
            <h3>Transaksi</h3>
            <p id="totalTransaksi">0</p>
        </div>

        <div class="card">
            <h3>Penjualan</h3>
            <p id="totalPenjualan">Rp 0</p>
        </div>

    </div>

</div>

<script src="script.js"></script>
</body>
</html>
