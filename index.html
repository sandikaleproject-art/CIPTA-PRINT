<div class="main">

    <!-- DASHBOARD -->
    <div id="dashboardPage">

        <div class="header">
            <h1>Dashboard</h1>
        </div>

        <div class="cards">

            <div class="card">
                <h3>Produk</h3>
                <p id="totalProduk">0</p>
            </div>

            <div class="card">
                <h3>Customer</h3>
                <p id="totalCustomer">0</p>
            </div>

            <div class="card">
                <h3>Transaksi</h3>
                <p id="totalTransaksi">0</p>
            </div>

            <div class="card">
                <h3>Penjualan</h3>
                <p id="totalPenjualan">Rp 0</p>
            </div>

        </div>

    </div>

    <!-- PRODUK -->
    <div id="produkPage" style="display:none;">

        <h2>Manajemen Produk</h2>

        <div class="form-produk">
            <input type="text" id="namaProduk" placeholder="Nama Produk">

            <select id="tipeProduk">
                <option value="satuan">Produk Biasa</option>
                <option value="meter">Per Meter (Banner)</option>
            </select>

            <input type="number" id="hargaProduk" placeholder="Harga / Meter">

            <button onclick="tambahProduk()">Tambah</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Nama</th>
                    <th>Tipe</th>
                    <th>Harga</th>
                    <th>Aksi</th>
                </tr>
            </thead>
            <tbody id="listProduk"></tbody>
        </table>

    </div>

    <!-- KASIR -->
    <div id="kasirPage" style="display:none;">

        <h2>Kasir</h2>

        <select id="pilihProduk" onchange="pilihProduk()">
            <option value="">-- Pilih Produk --</option>
        </select>

        <div id="inputUkuran" style="display:none;">
            <input type="number" id="lebar" placeholder="Lebar (cm)">
            <input type="number" id="tinggi" placeholder="Tinggi (cm)">
        </div>

        <br>

        <button onclick="hitungHarga()">Hitung</button>

        <h3 id="hasilHarga">Total: Rp 0</h3>

    </div>

</div>
