<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <title>CIPTA PRINT POS</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>CIPTA PRINT</h2>
    <ul>
       <li onclick="showMenu('dashboard', event)" class="active">Dashboard</li>
<li onclick="showMenu('produk', event)">Produk</li>
<li onclick="showMenu('kasir', event)">Kasir</li>
    </ul>
</div>

<!-- MAIN -->
<div class="main">

    <!-- DASHBOARD -->
    <div id="dashboardPage">

        <div class="header">
            <h1>Dashboard</h1>
        </div>

        <div class="cards">

            <div class="card">
                <h3>Produk</h3>
                <p id="totalProduk">0</p>
            </div>

            <div class="card">
                <h3>Customer</h3>
                <p id="totalCustomer">0</p>
            </div>

            <div class="card">
                <h3>Transaksi</h3>
                <p id="totalTransaksi">0</p>
            </div>

            <div class="card">
                <h3>Penjualan</h3>
                <p id="totalPenjualan">Rp 0</p>
            </div>

        </div>

    </div>

    <!-- PRODUK -->
    <div id="produkPage" style="display:none;">

        <h2>Manajemen Produk</h2>

        <div class="form-produk">
            <input type="text" id="namaProduk" placeholder="Nama Produk">

            <select id="tipeProduk">
                <option value="satuan">Produk Biasa</option>
                <option value="meter">Per Meter (Banner)</option>
            </select>

            <input type="number" id="hargaProduk" placeholder="Harga / Meter">

            <button onclick="tambahProduk()">Tambah</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Nama</th>
                    <th>Tipe</th>
                    <th>Harga</th>
                    <th>Aksi</th>
                </tr>
            </thead>
            <tbody id="listProduk"></tbody>
        </table>

    </div>

    <!-- KASIR -->
   <div id="kasirPage" style="display:none;">

    <h2>Kasir</h2>

    <select id="pilihProduk" onchange="pilihProduk()">
        <option value="">-- Pilih Produk --</option>
    </select>

    <div id="inputUkuran" style="display:none;">
        <input type="number" id="lebar" placeholder="Lebar (cm)">
        <input type="number" id="tinggi" placeholder="Tinggi (cm)">
    </div>

    <input type="number" id="qty" placeholder="Qty" value="1">

    <br>

    <button onclick="tambahKeKeranjang()">Tambah ke Keranjang</button>

    <h3>Keranjang</h3>

    <table>
        <thead>
        <tr>
    <th>Nama</th>
    <th>Ukuran</th> <!-- TAMBAHKAN INI -->
    <th>Qty</th>
    <th>Harga</th>
    <th>Total</th>
    <th>Aksi</th>
</tr>
        </thead>
        <tbody id="keranjangList"></tbody>
    </table>

    <h2 id="grandTotal">Total: Rp 0</h2>
<hr>

<h3>Pembayaran</h3>

<label>Metode Pembayaran:</label>
<select id="metodeBayar">
    <option value="cash">Cash</option>
    <option value="transfer">Transfer</option>
</select>

<br><br>

<label>Uang Bayar:</label>
<input type="number" id="uangBayar" placeholder="Masukkan uang">

<br><br>

<h3 id="kembalian">Kembalian: Rp 0</h3>

<button onclick="prosesBayar()">Bayar & Cetak Nota</button>
</div>
</div>

<script src="script.js"></script>

</body>
</html>
