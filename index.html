<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>CIPTA PRINT POS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>CIPTA PRINT</h2>
    <ul>
        <li class="active">Dashboard</li>
        <li>Produk</li>
        <li>Customer</li>
        <li>Kasir</li>
        <li>Laporan</li>
        <li>Pengaturan</li>
    </ul>
</div>

<!-- MAIN -->
<div class="main">

    <!-- HEADER -->
    <div class="header">
        <h1>Dashboard</h1>
    </div>

    <!-- CARD -->
    <div class="cards">

        <div class="card">
            <h3>Produk</h3>
            <p id="totalProduk">0</p>
        </div>

        <div class="card">
            <h3>Customer</h3>
            <p id="totalCustomer">0</p>
        </div>

        <div class="card">
            <h3>Transaksi</h3>
            <p id="totalTransaksi">0</p>
        </div>

        <div class="card">
            <h3>Penjualan</h3>
            <p id="totalPenjualan">Rp 0</p>
        </div>

    </div>

</div>

<script src="script.js"></script>
</body>
</html>
